<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
  <!-- Eastern Cape dusk — rolling hills, rondavels, aloes, an elderly couple
       walking home. Brand-toned silhouette art; sits behind the hero text. -->
  <defs>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c766" stop-opacity=".55"/>
      <stop offset="45%" stop-color="#d4a82a" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#d4a82a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332" stop-opacity="0"/>
      <stop offset="100%" stop-color="#10141f" stop-opacity=".9"/>
    </linearGradient>
  </defs>

  <!-- low sun -->
  <circle cx="1150" cy="330" r="230" fill="url(#sun)"/>
  <circle cx="1150" cy="330" r="52" fill="#e8c766" opacity=".5"/>

  <!-- far mountains -->
  <path d="M0 400 Q180 330 360 385 T720 375 Q900 330 1080 380 T1440 370 L1600 385 L1600 640 L0 640 Z" fill="#232e47" opacity=".85"/>
  <!-- mid hills -->
  <path d="M0 460 Q220 400 430 450 T860 445 Q1060 405 1250 455 T1600 445 L1600 640 L0 640 Z" fill="#1d2739"/>
  <!-- foreground slope -->
  <path d="M0 545 Q300 495 640 530 T1240 525 Q1440 510 1600 535 L1600 640 L0 640 Z" fill="#161d2c"/>

  <!-- footpath curving home -->
  <path d="M660 640 Q750 588 855 570 Q955 553 1032 547 L1048 552 Q965 562 875 580 Q775 600 715 640 Z" fill="#242f45" opacity=".75"/>

  <!-- rondavels on the mid hill -->
  <g opacity=".95">
    <!-- rondavel 1 -->
    <rect x="1020" y="512" width="86" height="42" rx="4" fill="#222c42"/>
    <path d="M1010 514 L1063 470 L1116 514 Z" fill="#2c3854"/>
    <path d="M1010 514 L1063 470 L1116 514" stroke="#d4a82a" stroke-width="2.5" fill="none" opacity=".55"/>
    <rect x="1053" y="530" width="18" height="24" rx="2" fill="#10141f"/>
    <!-- rondavel 2 (smaller, behind) -->
    <rect x="1150" y="505" width="60" height="32" rx="3" fill="#20293e"/>
    <path d="M1143 507 L1180 476 L1217 507 Z" fill="#293350"/>
    <path d="M1143 507 L1180 476 L1217 507" stroke="#d4a82a" stroke-width="2" fill="none" opacity=".45"/>
    <!-- rondavel 3 (far left) -->
    <rect x="250" y="498" width="54" height="28" rx="3" fill="#1f2a3f"/>
    <path d="M244 500 L277 473 L310 500 Z" fill="#283350"/>
    <path d="M244 500 L277 473 L310 500" stroke="#d4a82a" stroke-width="1.8" fill="none" opacity=".4"/>
  </g>

  <!-- aloe ferox silhouettes -->
  <g fill="#0f1524">
    <g transform="translate(150,560)">
      <rect x="-4" y="-52" width="8" height="52" rx="3"/>
      <path d="M0 -52 C-16 -66 -34 -70 -46 -66 C-30 -58 -18 -50 0 -46 Z"/>
      <path d="M0 -52 C16 -66 34 -70 46 -66 C30 -58 18 -50 0 -46 Z"/>
      <path d="M0 -58 C-10 -74 -12 -88 -8 -96 C-2 -84 2 -72 2 -58 Z"/>
      <path d="M0 -58 C10 -74 12 -88 8 -96 C2 -84 -2 -72 -2 -58 Z"/>
      <path d="M0 -50 C-22 -54 -40 -50 -52 -42 C-34 -40 -16 -42 0 -44 Z"/>
      <path d="M0 -50 C22 -54 40 -50 52 -42 C34 -40 16 -42 0 -44 Z"/>
    </g>
    <g transform="translate(1490,545) scale(.8)">
      <rect x="-4" y="-52" width="8" height="52" rx="3"/>
      <path d="M0 -52 C-16 -66 -34 -70 -46 -66 C-30 -58 -18 -50 0 -46 Z"/>
      <path d="M0 -52 C16 -66 34 -70 46 -66 C30 -58 18 -50 0 -46 Z"/>
      <path d="M0 -58 C-10 -74 -12 -88 -8 -96 C-2 -84 2 -72 2 -58 Z"/>
      <path d="M0 -58 C10 -74 12 -88 8 -96 C2 -84 -2 -72 -2 -58 Z"/>
    </g>
  </g>

  <!-- elderly couple walking the path, silhouettes -->
  <g fill="#0b101d" transform="translate(830,556) scale(1.05)">
    <!-- gogo: headscarf, shawl, slightly bent -->
    <path d="M0 0 C-1 -10 -2 -20 0 -30 C2 -38 8 -42 13 -41 C18 -40 21 -35 21 -30 L20 -12 C24 -6 25 0 24 6 L20 34 L15 34 L16 8 L10 8 L8 34 L3 34 L4 4 C1 2 0 1 0 0 Z"/>
    <circle cx="14" cy="-47" r="7.5"/>
    <path d="M6 -50 C8 -56 20 -56 22 -49 C22 -45 20 -44 14 -44 C9 -44 7 -46 6 -50 Z"/>
    <!-- tata: hat, walking stick, gentle stoop -->
    <g transform="translate(38,-2)">
      <path d="M0 -2 C-2 -14 -1 -24 3 -32 C6 -38 12 -40 16 -38 C20 -36 22 -31 21 -25 L19 -8 C22 -2 23 4 22 8 L18 36 L13 36 L14 10 L8 10 L5 36 L0 36 L2 6 C0 3 0 0 0 -2 Z"/>
      <circle cx="12" cy="-45" r="7"/>
      <rect x="2" y="-52" width="21" height="4" rx="2"/>
      <rect x="6" y="-58" width="13" height="7" rx="2"/>
      <rect x="27" y="-20" width="3.5" height="56" rx="1.5" transform="rotate(6 28 -20)"/>
    </g>
  </g>

  <!-- birds -->
  <g stroke="#8fa0c0" stroke-width="2.5" fill="none" opacity=".5" stroke-linecap="round">
    <path d="M1220 190 q9 -9 18 0 q9 -9 18 0"/>
    <path d="M1275 215 q7 -7 14 0 q7 -7 14 0"/>
    <path d="M1180 235 q6 -6 12 0 q6 -6 12 0"/>
  </g>

  <!-- bottom fade into page -->
  <rect x="0" y="560" width="1600" height="80" fill="url(#fade)"/>
</svg>
